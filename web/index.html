<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA Local Verifier</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">AURA verifier</p>
        <h1>Verify an AURA Evidence Package locally</h1>
        <p class="scope">
          This verifies integrity, signature and timestamped declaration. It does not adjudicate
          ownership, authorship, licensing or infringement. Everything is computed in your browser —
          no third-party verdict is ever shown as the result.
        </p>
      </section>

      <!-- Convenience load: populated when the page is opened with ?uid=…&src=…
           (or ?manifest=…). The manifest is fetched from the shown source; you can
           always replace it with a local file below. Verification stays local. -->
      <section id="sourceBanner" class="source-banner hidden" aria-live="polite"></section>

      <section class="panel">
        <label>
          <span>Asset file <em>(optional — omit for a catalog claim)</em></span>
          <input id="asset" type="file" />
        </label>
        <label>
          <span>Manifest JSON</span>
          <input id="manifest" type="file" accept="application/json,.json" />
        </label>
        <label>
          <span>Public key PEM <em>(optional if the manifest pins a Zenodo-archived key)</em></span>
          <input id="publicKey" type="file" accept=".pem,text/plain" />
        </label>
        <label>
          <span>Issuer JSON (optional)</span>
          <input id="issuer" type="file" accept="application/json,.json" />
        </label>

        <button id="verify" type="button">Verify locally</button>
      </section>

      <section id="result" class="result hidden" aria-live="polite"></section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
